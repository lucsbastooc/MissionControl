services:
  postgres:
    image: postgres:16-alpine
    container_name: mission-control-db
    environment:
      POSTGRES_DB: mission_control
      POSTGRES_USER: mission_control
      POSTGRES_PASSWORD: mission_control_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mission_control -d mission_control"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
